version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # 7-day cooldown mirrors the exclude-newer quarantine in pyproject.toml:
    # Dependabot waits at least 7 days before raising a PR for a new version,
    # giving the community time to detect and yank malicious releases.
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
