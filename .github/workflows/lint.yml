name: Lint

on:
  # NOTE: `pull_request.branches` filters by TARGET branch -- a PR into a branch
  # not listed here runs NO lint at all (no ruff, no mypy). Every integration
  # branch that sub-PRs land on has to be added below, or those sub-PRs merge
  # unlinted: mypy is the gate that catches exactly what a package split breaks
  # (moved symbols, stale re-exports, circular imports).
  push:
    branches: [main, epic/193-core-algebra]
  pull_request:
    branches: [main, feat/core-packages, epic/193-core-algebra]

concurrency:
  # Mirrors `test.yml`: grouping on the ref alone means merging one PR CANCELS
  # another's in-flight run, and a cancelled run is not a green one. Grouping on
  # the SHA gives every merge commit its own group, gated on its own merits.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    # Standard GitHub runner: free with unlimited minutes on public repos.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install dependencies
        # --all-extras: mypy must resolve the [semantic]/[llm]/[trained]
        # symbols that W0.4 made lazy (still statically type-checked via
        # TYPE_CHECKING imports) -- a core-only `uv sync` wouldn't have
        # torch/faiss/litellm/scikit-learn installed for it to check against.
        # --no-extra finetune: peft/trl/bitsandbytes are treated as untyped
        # (pyproject mypy override) and core.finetune imports them lazily, so the
        # type check needs neither installed -- keep the heavy/Linux-only deps out.
        run: uv sync --all-extras --no-extra finetune

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src
