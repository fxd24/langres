name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allows manual triggering

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi  # Optional: matches what you set in PyPI
    permissions:
      id-token: write  # REQUIRED for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install uv
        # Pinned action instead of `curl … | sh`: a hash-pinned install avoids
        # running an unpinned remote script in the release pipeline (Scorecard
        # PinnedDependencies). Same pin/version used across the CI workflows.
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
