name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.24"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # pip-audit and guarddog are ADVISORY signals, not merge gates. The hard
      # supply-chain controls are the exclude-newer 7-day quarantine (pyproject)
      # + Dependabot cooldown + Dependabot security PRs. These steps run so their
      # findings stay visible (reviewed via the weekly scheduled run) but must
      # not block PRs: the quarantine deliberately delays patches (so a non-empty
      # CVE list is expected and clears on the next `make upgrade-deps`), and
      # guarddog is heuristic with many false positives (CUDA bundled binaries,
      # the dspy<->dnspython typosquat FP, single-file packages, etc.).
      - name: pip-audit (CVE scan, advisory)
        continue-on-error: true
        run: uv run pip-audit

      - name: guarddog (malicious-package scan, advisory)
        continue-on-error: true
        run: |
          uv export --no-hashes --format requirements-txt -o /tmp/langres-req.txt
          uv run guarddog pypi verify /tmp/langres-req.txt
