name: Security

# pip-audit + guarddog are ADVISORY only (continue-on-error, never a merge
# gate) and their findings are reviewed on the weekly cadence -- see the step
# comments below. Running them on every push/PR paid for the repo's heaviest
# install (`uv sync --all-extras`: torch/litellm/faiss/scikit-learn) plus a
# full guarddog scan on every commit for zero gate value (historically the
# main CI cost driver). So this runs on the weekly schedule + on demand only.
on:
  schedule:
    # Weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  security:
    # Standard GitHub runner: free with unlimited minutes on public repos.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.24"
          enable-cache: true

      - name: Install dependencies
        # --all-extras: scan the [semantic]/[llm] extras' dependencies (torch,
        # litellm, faiss, ...) too, not just the core-only dependency set.
        # --no-extra finetune: keep the heavy/Linux-only QLoRA stack
        # (peft/trl/bitsandbytes) out of every normal job (it has its own
        # `test-finetune` job). pip-audit/guarddog here are advisory anyway.
        run: uv sync --all-extras --no-extra finetune

      # pip-audit and guarddog are ADVISORY signals, not merge gates. The hard
      # supply-chain controls are the exclude-newer 7-day quarantine (pyproject)
      # + Dependabot cooldown + Dependabot security PRs. These steps run so their
      # findings stay visible (reviewed via the weekly scheduled run) but must
      # not block PRs: the quarantine deliberately delays patches (so a non-empty
      # CVE list is expected and clears on the next `make upgrade-deps`), and
      # guarddog is heuristic with many false positives (CUDA bundled binaries,
      # the dspy<->dnspython typosquat FP, single-file packages, etc.).
      - name: pip-audit (CVE scan, advisory)
        continue-on-error: true
        run: uv run pip-audit

      - name: guarddog (malicious-package scan, advisory)
        continue-on-error: true
        run: |
          uv export --no-hashes --format requirements-txt -o /tmp/langres-req.txt
          uv run guarddog pypi verify /tmp/langres-req.txt
