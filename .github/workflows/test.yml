name: Test

# Per-PR: run the FAST suite only (slow ML tests excluded -- see the `test`
# job). The full suite incl. slow tests + the 95% coverage gate runs on every
# merge to main (push) + on demand (workflow_dispatch) via the `test-full` job,
# so slow embedding/ML tests don't cost ~10min on every PR. This repo is public,
# so Actions minutes are free/unlimited -- per-merge coverage is worth it, while
# the fast suite still runs per-PR. Jobs are gated by event with `if:` below.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast per-PR tests: everything EXCEPT the ~76 slow embedding/ML tests (they
  # load heavy torch models and dominate wall-time). Coverage is collected but
  # NOT gated here (`--cov-fail-under=0` overrides the pyproject default),
  # because the excluded slow tests are the only cover for some ML paths -- the
  # 95% floor is enforced on `test-full` below.
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        # --all-extras: the non-slow suite still exercises VectorBlocker/
        # LLMJudge/RandomForestJudge/etc. (the [semantic]/[llm]/[trained] extras), which
        # W0.4 made optional at runtime but which CI still needs installed to
        # run those tests.
        # --no-extra finetune: the QLoRA training stack (peft/trl/bitsandbytes) is
        # heavy + Linux/CUDA-fragile and is covered by the dedicated `test-finetune`
        # job below -- core.finetune imports it lazily, so the fast suite exercises
        # the finetune orchestration with a fake trainer, no training stack needed.
        run: uv sync --all-extras --no-extra finetune

      - name: Run fast unit tests (excludes slow ML tests)
        run: uv run pytest -m "not integration and not slow and not finetune" --cov-fail-under=0

  test-core-only:
    if: github.event_name == 'pull_request'
    # 2-vCPU (smallest): a ~20s import-boundary check, no parallel work.
    #
    # W0.4: proves the [semantic]/[llm] extras boundary against a genuinely
    # core-only install, not just a simulated one -- `test` above always runs
    # with --all-extras, so tests/test_import_budget.py's real (un-monkeypatched)
    # ImportError-on-missing-dependency assertions only ever exercise their
    # `pytest.importorskip`-guarded skip branch there. Runs bare `uv sync` (no
    # extras; the "dev" dependency group -- pytest et al -- still installs by
    # default) so torch/litellm/faiss/sentence-transformers are genuinely
    # absent, then a *targeted* subset: the full test suite can't even collect
    # here (many test files import those packages directly to mock them), so
    # this only runs the import-budget file plus a quickstart smoke check.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (core only -- no [semantic]/[llm] extras)
        run: uv sync

      - name: Run import-budget tests against the real core-only install
        run: uv run pytest tests/test_import_budget.py -o addopts="-v -m 'not integration'"

      - name: Verify the core-only string-judge dedupe() path still works
        run: uv run python examples/quickstart_verbs.py

      - name: Verify the core-only eval tearsheet ($0 EvalReport -> to_html) works
        run: uv run python examples/quickstart_eval.py

      # The paved-road flywheel loop (dedupe -> review -> CLI CSV round-trip ->
      # harvest -> tuned threshold -> tearsheet) must work on a bare `uv sync`
      # from a clean checkout -- string judge only, $0, no extras.
      - name: Verify the core-only flywheel loop (examples/flywheel_min.py) works
        run: uv run python examples/flywheel_min.py

  # Full suite INCLUDING the slow embedding/ML tests, plus the 95% coverage gate
  # (inherited from pyproject addopts). Runs on every merge to main (push) + on
  # demand (workflow_dispatch) -- NOT per PR -- so ML regressions and the
  # coverage floor are enforced on every merge without paying ~10min on every
  # PR. Trigger an ad-hoc run before a release or a risky ML change with the
  # "Run workflow" button (workflow_dispatch). Do NOT mark this a required
  # status check (it is skipped on PR events).
  test-full:
    if: github.event_name != 'pull_request'
    # 4-vCPU: the slow ML tests' torch inference uses all 4 cores via torch's
    # intra-op threading. (pytest-xdist `-n auto` was tried and REVERTED -- 4
    # workers x ~4 torch threads oversubscribes the cores and runs slower.)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        # --no-extra finetune: same rationale as the `test` job -- the QLoRA
        # training stack is covered by `test-finetune`; core.finetune's lazy
        # imports keep the full suite green without peft/trl/bitsandbytes here.
        run: uv sync --all-extras --no-extra finetune

      - name: Run full suite incl. slow tests (95% coverage gate)
        # --cov-report=xml (on top of the pyproject default term/html reports)
        # emits coverage.xml for the Codecov upload below. This is the ONLY job
        # that runs the full suite, so it's the only place coverage is honest --
        # the per-PR `test` job deliberately excludes the slow ML tests, so
        # uploading its partial numbers would understate real coverage.
        run: uv run pytest -m "not integration and not finetune" --cov-report=xml

      - name: Upload coverage to Codecov
        # Advisory, never a merge gate: fail_ci_if_error stays false so a Codecov
        # hiccup can't turn this merge-to-main run red. Token is required for uploads.
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # The [finetune] extra's OWN job: install the QLoRA training stack (peft/trl/
  # bitsandbytes) that every other job deliberately excludes (`--no-extra
  # finetune`) and run the `finetune`-marked tests -- the CPU dry-run that actually
  # imports peft/trl and trains a tiny LoRA (no GPU). Kept NON-BLOCKING
  # (`continue-on-error: true`) so a fragile/heavy/Linux-only training dep can
  # never red-CI the whole training-surface epic; once the QLoRA path is proven
  # stable this can be promoted to a required check. The real GPU QLoRA train is
  # `@pytest.mark.slow` + local-only (needs CUDA + bitsandbytes 4-bit), excluded here.
  test-finetune:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.24"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (incl. the [finetune] training stack)
        run: uv sync --all-extras

      - name: Run finetune tests (CPU dry-run; real GPU train is slow + local-only)
        run: uv run pytest -m "finetune and not slow" --cov-fail-under=0
